<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEFI Network • Wallet</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Main Content -->
        <main id="mainContent">
            <!-- Header -->
            <div class="header">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userId">Loading...</span>
                </div>
                <div class="notifications">
                    <i class="fas fa-bell"></i>
                </div>
            </div>

            <!-- Total Balance Card -->
            <div class="balance-card">
                <div class="balance-label">Total Balance</div>
                <div class="balance-amount" id="totalBalance">$0.00</div>
                <div class="balance-actions">
                    <button class="action-btn" onclick="showDepositModal()">
                        <i class="fas fa-arrow-down"></i> Deposit
                    </button>
                    <button class="action-btn" onclick="showWithdrawModal()">
                        <i class="fas fa-arrow-up"></i> Withdraw
                    </button>
                </div>
            </div>

            <!-- Top 10 Cryptocurrencies -->
            <div class="section-title">
                <h3>Top 10 Cryptocurrencies</h3>
            </div>
            <div class="crypto-list" id="cryptoList">
                <!-- Will be populated by JavaScript -->
            </div>
        </main>

        <!-- Navigation Bar -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="showSection('wallet')">
                <i class="fas fa-wallet"></i>
                <span>Wallet</span>
            </button>
            <button class="nav-item" onclick="showSection('referral')">
                <i class="fas fa-users"></i>
                <span>Referral</span>
            </button>
            <button class="nav-item" onclick="showSection('swap')">
                <i class="fas fa-exchange-alt"></i>
                <span>Swap</span>
            </button>
            <button class="nav-item" onclick="showSection('staking')">
                <i class="fas fa-lock"></i>
                <span>Staking</span>
            </button>
        </nav>
    </div>

    <!-- Modals -->
    
    <!-- Deposit Modal -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Deposit Funds</h3>
                <button onclick="closeModal('depositModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Select Currency</label>
                    <select id="depositCurrency" onchange="updateDepositMin()">
                        <option value="REFI">REFI (Min: 500,000)</option>
                        <option value="USDT">USDT (Min: 10)</option>
                        <option value="BNB">BNB (Min: 0.02)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="depositAmount" placeholder="Enter amount">
                </div>
                <div class="form-group">
                    <label>Transaction ID</label>
                    <input type="text" id="txnId" placeholder="Enter transaction ID">
                </div>
                <div class="deposit-address">
                    <p>Send to this address:</p>
                    <code>0xbf70420f57342c6Bd4267430D4D3b7E946f09450</code>
                    <button onclick="copyAddress()" class="copy-btn">
                        <i class="far fa-copy"></i> Copy
                    </button>
                </div>
                <button class="submit-btn" onclick="submitDeposit()">Submit Deposit</button>
            </div>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Withdraw Funds</h3>
                <button onclick="closeModal('withdrawModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Select Currency</label>
                    <select id="withdrawCurrency" onchange="checkWithdrawFee()">
                        <option value="REFI">REFI (No fee)</option>
                        <option value="USDT">USDT (Fee: 0.00016 BNB)</option>
                        <option value="BNB">BNB (No fee)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="withdrawAmount" placeholder="Enter amount">
                </div>
                <div class="form-group">
                    <label>Wallet Address</label>
                    <input type="text" id="walletAddress" placeholder="Enter your wallet address">
                </div>
                <div id="feeWarning" class="fee-warning hidden">
                    ⚠️ USDT withdrawal requires 0.00016 BNB for fees
                </div>
                <button class="submit-btn" onclick="submitWithdraw()">Submit Withdrawal</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
